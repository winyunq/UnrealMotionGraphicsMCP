name: Deploy GitHub Pages

on:
  push:
    branches:
      - Document
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch current public source
        run: git fetch origin main:refs/remotes/origin/main

      - name: Validate documentation against current source
        run: node Scripts/validate-site-docs.mjs --source-ref origin/main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir _site
          rsync -a --delete \
            --include '/assets/***' \
            --include '/*.html' \
            --exclude '*' \
            ./ _site/
          git archive origin/main Document Resources/Icon128.png | tar -x -C _site
          touch _site/.nojekyll

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
