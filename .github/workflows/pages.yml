name: Deploy GitHub Pages

on:
  push:
    branches:
      - copilot/website
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir _site
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.Doxyfile' \
            --exclude '.gitignore' \
            --exclude '_site' \
            ./ _site/
          touch _site/.nojekyll

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
